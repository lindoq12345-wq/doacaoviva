<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doação Viva</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Doação Viva</h1>
      <p>Envie sua contribuição com segurança. Este formulário envia os dados ao backend Node.js/Express.</p>

      <form id="donation-form">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="valor">Valor da doação</label>
        <input type="number" id="valor" name="valor" min="1" step="0.01" required />

        <label for="mensagem">Mensagem (opcional)</label>
        <textarea id="mensagem" name="mensagem" rows="4" placeholder="Deixe uma mensagem..."></textarea>

        <button type="submit">Enviar doação</button>
      </form>

      <div id="feedback" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById('donation-form');
    const feedback = document.getElementById('feedback');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      feedback.textContent = '';

      const formData = new FormData(form);
      const payload = {
        nome: formData.get('nome'),
        email: formData.get('email'),
        valor: formData.get('valor'),
        mensagem: formData.get('mensagem')
      };

      try {
        const response = await fetch('/api/donations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          const errorText = result.errors
            ? result.errors.map((error) => error.msg).join(' ')
            : result.error || 'Ocorreu um problema ao enviar o formulário.';
          feedback.textContent = errorText;
          feedback.className = 'feedback error';
          return;
        }

        feedback.textContent = result.message;
        feedback.className = 'feedback success';
        form.reset();
      } catch (error) {
        feedback.textContent = 'Erro de rede. Tente novamente mais tarde.';
        feedback.className = 'feedback error';
        console.error(error);
      }
    });
  </script>
</body>
</html>
