services:
  postgres:
    image: postgres:16-alpine
    container_name: doacaoviva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: doacaoviva
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doacaoviva-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/doacaoviva
      PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start

volumes:
  postgres-data:
